{% extends "base.html" %}
{% load static %}

{% block title %}AI Workspace — ShopEase{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/ai.css' %}?v=20260528a">
{% endblock %}

{% block content %}
<div id="workspaceLayout" class="workspace-layout">
    <!-- Sidebar -->
    <aside class="workspace-sidebar" id="workspaceSidebar">
        <div class="sidebar-header">
            <button class="sidebar-new-btn" onclick="newSession()">+ New Chat</button>
        </div>
        <div class="sidebar-session-list" id="sessionList"></div>
    </aside>

    <!-- Main Chat -->
    <div class="workspace-main">
        <div class="workspace-main-content" id="chatContainer">
            <div id="chatEmpty" class="chat-empty">
                <div class="empty-icon">💬</div>
                <h3>Your AI shopping assistant</h3>
                <div class="suggestion-chips">
                    <button class="chip" onclick="useSuggestion('Recommend a budget laptop for a college student')">💻 Budget laptop</button>
                    <button class="chip" onclick="useSuggestion('Compare iPhone vs Samsung flagship phones')">📱 Phone comparison</button>
                    <button class="chip" onclick="useSuggestion('What are the best-selling products this month?')">🔥 Best sellers</button>
                    <button class="chip" onclick="useSuggestion('Find me headphones under $100 with good reviews')">🎧 Budget headphones</button>
                </div>
            </div>
        </div>

        <!-- Error Banner -->
        <div id="errorBanner" class="error-area hidden">
            <span class="error-icon">⚠️</span>
            <span id="errorText"></span>
            <button class="btn btn-outline btn-sm" onclick="dismissError()">Dismiss</button>
        </div>

        <!-- Input -->
        <div class="workspace-main-input">
            <div class="workspace-input-area">
                <textarea id="workspaceInput" class="workspace-input"
                    placeholder="e.g. Recommend a tablet for a statistics student..."
                    rows="2" autofocus></textarea>
                <button id="workspaceSubmit" class="workspace-submit-btn" onclick="submitWorkspace()">
                    <span id="submitIcon">➤</span>
                    <span id="submitSpinner" class="spinner-hidden"></span>
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// ═══════════════════════════════════════════
// Auth Detection
// ═══════════════════════════════════════════
const AUTH_TOKEN = localStorage.getItem('access_token');
const IS_GUEST = !AUTH_TOKEN;

// Rebuild artifacts from stored metadata
function buildArtifacts(meta) {
    const artifacts = [];
    const blocks = meta.blocks || [];
    blocks.forEach(block => {
        if (block.type === 'product_card') {
            artifacts.push({type: 'products', payload: block.data});
            if (block.data.display_id) currentDisplayId = block.data.display_id;
        }
        else if (block.type === 'cart_card') artifacts.push({type: 'cart_card', payload: block.data});
        else if (block.type === 'clarify') artifacts.push({type: 'clarify', payload: block.data});
        else if (block.type === 'explain') artifacts.push({type: 'explain', payload: block.data});
        else if (block.type === 'confirm_dialog') artifacts.push({type: 'confirm_dialog', payload: block.data});
        else if (block.type === 'order_created_card') artifacts.push({type: 'order_created_card', payload: block.data});
    });
    return artifacts;
}

if (IS_GUEST) {
    document.getElementById('workspaceLayout').classList.add('guest');
}

function apiHeaders() {
    const h = {'Content-Type': 'application/json'};
    if (AUTH_TOKEN) h['Authorization'] = 'Bearer ' + AUTH_TOKEN;
    return h;
}

function getCSRF() {
    return document.querySelector('[name=csrfmiddlewaretoken]')?.value || '';
}

// ═══════════════════════════════════════════
// Session State
// ═══════════════════════════════════════════
let currentSessionId = '';
let persistedMessages = [];
let ephemeralMessages = [];
let currentDisplayId = '';                  // for CartAgent context
let sessions = [];

function conversation() {
    return [...persistedMessages, ...ephemeralMessages];
}

// ═══════════════════════════════════════════
// URL Sync
// ═══════════════════════════════════════════
function urlSessionId() {
    const p = new URLSearchParams(window.location.search);
    return p.get('session') || '';
}

function setUrlSession(sid) {
    const url = new URL(window.location);
    if (sid) {
        url.searchParams.set('session', sid);
    } else {
        url.searchParams.delete('session');
    }
    window.history.replaceState({}, '', url);
}

// ═══════════════════════════════════════════
// Session Management
// ═══════════════════════════════════════════
async function loadSessions() {
    if (IS_GUEST) return;
    try {
        const resp = await fetch('/api/agents/sessions/', {headers: apiHeaders()});
        if (resp.status === 401) { IS_GUEST_really(); return; }
        sessions = await resp.json();
        renderSessionList();
    } catch(e) { /* silent */ }
}

function IS_GUEST_really() {
    document.getElementById('workspaceLayout').classList.add('guest');
}

async function newSession() {
    if (IS_GUEST) { clearConversation(); return; }
    // Don't create server-side session yet — wait for first message
    currentSessionId = '';
    persistedMessages = [];
    ephemeralMessages = [];
    setUrlSession('');
    renderSessionList();
    renderConversation();
}

function switchSession(sid) {
    currentSessionId = sid;
    setUrlSession(sid);
    persistedMessages = [];
    ephemeralMessages = [];
    loadSessionMessages(sid);
    renderSessionList();
    renderConversation();
}

async function loadSessionMessages(sid) {
    if (IS_GUEST) {
        loadMessages();  // localStorage fallback
        return;
    }
    try {
        const resp = await fetch('/api/agents/sessions/' + sid + '/messages/', {
            headers: apiHeaders()
        });
        if (!resp.ok) return;
        const msgs = await resp.json();
        persistedMessages = msgs.map((m, i) => ({
            id: 'svr_' + i,
            role: m.role,
            content: m.content,
            session_id: sid,
            timestamp: new Date(m.created_at).getTime(),
            artifacts: buildArtifacts(m.metadata || {})
        }));
        renderConversation();
    } catch(e) {
        // fallback to localStorage
        loadMessages();
        renderConversation();
    }
}

async function deleteSession(sid) {
    const e = window.event;
    if (e) e.stopPropagation();
    if (!confirm('Delete this conversation?')) return;
    try {
        await fetch('/api/agents/sessions/' + sid + '/delete/', {
            method: 'DELETE', headers: apiHeaders()
        });
        sessions = sessions.filter(s => s.session_id !== sid);
        if (currentSessionId === sid) {
            currentSessionId = '';
            persistedMessages = [];
            ephemeralMessages = [];
            setUrlSession('');
        }
        renderSessionList();
        renderConversation();
    } catch(err) { /* silent */ }
}

function renderSessionList() {
    const el = document.getElementById('sessionList');
    if (!el) return;
    let html = '';
    sessions.forEach(s => {
        const title = s.title || 'New Chat';
        const active = s.session_id === currentSessionId ? ' active' : '';
        html += '<div class="sidebar-session-item' + active + '" onclick="switchSession(\'' + s.session_id + '\')">' +
            '<span class="sidebar-session-title" ondblclick="editSessionTitle(\'' + s.session_id + '\', event)" title="Double-click to rename">' + escapeHtml(title) + '</span>' +
            '<button class="sidebar-session-edit" onclick="editSessionTitle(\'' + s.session_id + '\', event)" title="Rename">✎</button>' +
            '<button class="sidebar-session-delete" onclick="deleteSession(\'' + s.session_id + '\')">×</button>' +
            '</div>';
    });
    el.innerHTML = html || '<div style="padding:1rem;color:#94a3b8;font-size:0.8rem;">No conversations yet</div>';
}

async function editSessionTitle(sid, e, presetTitle) {
    if (e) e.stopPropagation();
    const title = presetTitle || prompt('New title:');
    if (!title || !title.trim()) return;
    try {
        await fetch('/api/agents/sessions/' + sid + '/', {
            method: 'PATCH', headers: apiHeaders(),
            body: JSON.stringify({title: title.trim()})
        });
        const s = sessions.find(s => s.session_id === sid);
        if (s) s.title = title.trim();
        renderSessionList();
    } catch(err) { /* silent */ }
}

// ═══════════════════════════════════════════
// Render (same as before, adapted for sidebar layout)
// ═══════════════════════════════════════════
function renderConversation() {
    const container = document.getElementById('chatContainer');
    const empty = document.getElementById('chatEmpty');
    const msgs = conversation();

    container.querySelectorAll('.chat-message').forEach(el => el.remove());

    if (msgs.length === 0) {
        empty.classList.remove('hidden');
        return;
    }
    empty.classList.add('hidden');
    msgs.forEach(msg => {
        const el = renderMessage(msg);
        container.appendChild(el);
    });
    container.scrollTop = container.scrollHeight;
}

function renderMessage(msg) {
    const row = document.createElement('div');
    row.className = 'chat-message ' + msg.role;

    const avatar = document.createElement('div');
    avatar.className = 'chat-avatar';
    avatar.textContent = msg.role === 'user' ? '👤' : '🤖';
    row.appendChild(avatar);

    const wrapper = document.createElement('div');
    wrapper.style.maxWidth = msg.role === 'user' ? '75%' : '85%';

    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble';

    if (msg._pending) {
        bubble.innerHTML = '<div class="chat-thinking"><span class="chat-thinking-dot"></span><span class="chat-thinking-dot"></span><span class="chat-thinking-dot"></span></div>';
    } else {
        bubble.innerHTML = formatMarkdown(msg.content);
    }
    wrapper.appendChild(bubble);

    // Artifacts
    if (msg.artifacts && msg.artifacts.length > 0 && msg.role === 'assistant') {
        const artContainer = document.createElement('div');
        artContainer.className = 'artifact-container';
        msg.artifacts.forEach(a => {
            if (a.type === 'products') renderProductCards(artContainer, a.payload);
            if (a.type === 'clarify') renderClarifyBlock(artContainer, a.payload);
            if (a.type === 'explain') renderExplainBlock(artContainer, a.payload);
            if (a.type === 'runtime') renderRuntimePanelInline(artContainer, a.payload);
            if (a.type === 'confirm_dialog') renderConfirmDialog(artContainer, a.payload);
            if (a.type === 'order_created_card') renderOrderCreatedCard(artContainer, a.payload);
        });
        wrapper.appendChild(artContainer);
    }

    row.appendChild(wrapper);
    return row;
}

// ═══════════════════════════════════════════
// Submit
// ═══════════════════════════════════════════
async function submitWorkspace() {
    const input = document.getElementById('workspaceInput');
    const query = input.value.trim();
    if (!query) return;

    // Auto-create session if needed
    if (IS_GUEST) {
        if (!currentSessionId) {
            currentSessionId = 'local_' + Date.now().toString(36);
            setUrlSession(currentSessionId);
        }
    } else if (!currentSessionId) {
        // Lazy create: only call API on first message
        try {
            const resp = await fetch('/api/agents/sessions/create/', {
                method: 'POST', headers: apiHeaders(), body: JSON.stringify({})
            });
            if (!resp.ok) return;
            const data = await resp.json();
            currentSessionId = data.session_id;
            setUrlSession(currentSessionId);
            await loadSessions();
        } catch(e) { return; }
    }

    // Save session_id to localStorage for guest persistence
    localStorage.setItem('ai_active_session', currentSessionId);

    // Add user message
    const userMsg = {
        id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36),
        role: 'user',
        content: query,
        session_id: currentSessionId,
        timestamp: Date.now(),
        artifacts: []
    };
    persistedMessages.push(userMsg);

    // Thinking indicator
    const thinkMsg = {
        id: 'thinking',
        role: 'assistant',
        content: '',
        session_id: currentSessionId,
        _pending: true
    };
    ephemeralMessages = [thinkMsg];

    input.value = '';
    input.style.height = 'auto';
    renderConversation();
    setLoading(true);

    try {
        // Build history for server
        const history = persistedMessages
            .filter(m => !m._pending && m.session_id === currentSessionId)
            .slice(-10)
            .map(m => ({role: m.role, content: m.content}));

        const resp = await fetch('/api/agents/ai/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRF(),
            },
            body: JSON.stringify({
                message: query,
                session_id: currentSessionId,
                history: history,
                display_id: currentDisplayId,
                request_id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)
            }),
        });

        if (!resp.ok) throw new Error('Server ' + resp.status);
        const data = await resp.json();

        // Build artifacts
        const artifacts = [];
        if (data.blocks) {
            data.blocks.forEach(block => {
                if (block.type === 'product_card') {
                    artifacts.push({type: 'products', payload: block.data});
                    if (block.data.display_id) currentDisplayId = block.data.display_id;
                }
                else if (block.type === 'cart_card') artifacts.push({type: 'cart_card', payload: block.data});
                else if (block.type === 'clarify') artifacts.push({type: 'clarify', payload: block.data});
                else if (block.type === 'explain') artifacts.push({type: 'explain', payload: block.data});
                else if (block.type === 'confirm_dialog') artifacts.push({type: 'confirm_dialog', payload: block.data});
                else if (block.type === 'order_created_card') artifacts.push({type: 'order_created_card', payload: block.data});
            });
        }
        if (data.runtime) {
            artifacts.push({type: 'runtime', payload: {runtime: data.runtime, explain: data.explain, retrieval: data.retrieval}});
        }

        ephemeralMessages = [];
        persistedMessages.push({
            id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36),
            role: 'assistant',
            content: data.reply || '(no reply)',
            session_id: currentSessionId,
            intent: data.intent || '',
            timestamp: Date.now(),
            artifacts: artifacts
        });

        renderConversation();
        setLoading(false);

        // Refresh session list (may have new title)
        if (!IS_GUEST) loadSessions();

    } catch(err) {
        ephemeralMessages = [];
        renderConversation();

        const errEl = document.getElementById('errorBanner');
        const errTxt = document.getElementById('errorText');
        errTxt.textContent = 'AI service unavailable. Please try again.';
        errEl.classList.remove('hidden');
        setLoading(false);
    }
}

function setLoading(loading) {
    const btn = document.getElementById('workspaceSubmit');
    const icon = document.getElementById('submitIcon');
    const spinner = document.getElementById('submitSpinner');
    const input = document.getElementById('workspaceInput');
    if (loading) {
        btn.disabled = true; icon.classList.add('hidden');
        spinner.classList.remove('spinner-hidden'); spinner.classList.add('spinner-visible');
        input.disabled = true;
    } else {
        btn.disabled = false; icon.classList.remove('hidden');
        spinner.classList.remove('spinner-visible'); spinner.classList.add('spinner-hidden');
        input.disabled = false; input.focus();
    }
}

function clearConversation() {
    if (!confirm('Clear current conversation?')) return;
    persistedMessages = [];
    ephemeralMessages = [];
    renderConversation();
}

// ═══════════════════════════════════════════
// localStorage fallback (guest + backward compat)
// ═══════════════════════════════════════════
const STORAGE_KEY = 'shopease_chat_history';

function loadMessages() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) persistedMessages = JSON.parse(raw).filter(m => m.session_id === currentSessionId);
    } catch(e) { persistedMessages = []; }
}

function saveMessages() {
    try {
        const all = [];
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) { try { all.push(...JSON.parse(raw)); } catch(e) {} }
        // replace messages for current session
        const others = all.filter(m => m.session_id !== currentSessionId);
        others.push(...persistedMessages.filter(m => !m._pending));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(others));
    } catch(e) { /* full */ }
}

// ═══════════════════════════════════════════
// Artifact Renderers (same as before)
// ═══════════════════════════════════════════
function renderProductCards(container, data) {
    const products = data.products || data.items || data || [];
    if (!Array.isArray(products) || products.length === 0) {
        container.innerHTML += '<p class="block-text">No products found.</p>';
        return;
    }
    const grid = document.createElement('div');
    grid.className = 'workspace-product-grid';
    products.slice(0, 12).forEach(p => {
        const card = document.createElement('div');
        card.className = 'workspace-product-card';
        const reason = p.reason ? '<span class="wp-reason">💡 ' + escapeHtml(p.reason) + '</span>' : '';
        card.innerHTML = '<div class="wp-card-media"><div class="product-placeholder" data-name="' + escapeHtml(p.name || 'Product') + '">' + (p.name || 'P')[0].toUpperCase() + '</div></div>' +
            '<div class="wp-card-body"><h4 class="wp-card-title">' + escapeHtml(p.name || 'Untitled') + '</h4>' +
            (p.rating ? '<span class="wp-card-rating">⭐ ' + p.rating + '</span>' : '') +
            '<span class="wp-card-price">¥' + (p.price || '--') + '</span>' + reason + '</div>';
        if (p.id || p.product_id) {
            card.style.cursor = 'pointer';
            card.onclick = function() {
                window.location.href = '/products/' + (p.id || p.product_id) + '/';
            };
        }
        grid.appendChild(card);
    });
    container.appendChild(grid);
}

function renderClarifyBlock(container, data) {
    const w = document.createElement('div'); w.className = 'clarify-wrapper';
    const q = document.createElement('p'); q.className = 'clarify-question';
    q.textContent = '💬 ' + (data.question || 'Please confirm:');
    w.appendChild(q);
    if (data.options && data.options.length) {
        const r = document.createElement('div'); r.className = 'clarify-options';
        data.options.forEach(opt => {
            const c = document.createElement('button'); c.className = 'clarify-chip';
            c.textContent = '¥' + opt;
            c.onclick = function() { document.getElementById('workspaceInput').value = opt; submitWorkspace(); };
            r.appendChild(c);
        });
        w.appendChild(r);
    }
    container.appendChild(w);
}

function renderExplainBlock(container, data) {
    const w = document.createElement('div'); w.className = 'explain-wrapper';
    w.innerHTML = '<p class="explain-summary">💡 ' + escapeHtml(data.summary || 'Why these?') + '</p>';
    if (data.items && data.items.length) {
        const l = document.createElement('ul'); l.className = 'explain-list';
        data.items.slice(0, 5).forEach(item => {
            l.innerHTML += '<li class="explain-item"><strong>' + escapeHtml(item.name) + '</strong> ' +
                (item.reasons || []).map(r => '<span class="explain-tag">' + r + '</span>').join(' ') + '</li>';
        });
        w.appendChild(l);
    }
    container.appendChild(w);
}

function renderRuntimePanelInline(container, data) {
    const rt = data.runtime;
    if (!rt && !data.explain && !data.retrieval) return;
    const panel = document.createElement('div'); panel.className = 'runtime-panel';
    panel.innerHTML = '<div class="runtime-header" onclick="this.parentElement.classList.toggle(\'collapsed\')">' +
        '<span>🔍 AI analysis</span><span class="runtime-total">' + (rt && rt.total_ms ? rt.total_ms + 'ms' : '') + '</span><span class="runtime-toggle">▼</span></div>';
    const body = document.createElement('div'); body.className = 'runtime-body';
    if (rt && rt.phases && rt.phases.length) {
        const tl = document.createElement('div'); tl.className = 'runtime-timeline';
        rt.phases.forEach(p => {
            const icon = p.status === 'fallback' ? '⚠️' : (p.status === 'skip' ? '○' : '✓');
            tl.innerHTML += '<div class="rt-phase"><span class="rt-dot rt-' + (p.status || 'ok') + '"></span>' +
                '<span class="rt-label">' + escapeHtml(p.label) + '</span><span class="rt-status">' + icon + '</span>' +
                '<span class="rt-ms">' + p.ms + 'ms</span></div>';
        });
        body.appendChild(tl);
    }
    if (data.explain && data.explain.factors && data.explain.factors.length) {
        body.innerHTML += '<div class="explain-section"><div class="explain-title">💡 ' + escapeHtml(data.explain.title || '') + '</div>' +
            '<div class="explain-chips">' + data.explain.factors.map(f => '<span class="explain-chip">' + escapeHtml(f.label) + '</span>').join('') + '</div></div>';
    }
    if (data.retrieval && data.retrieval.detail) {
        body.innerHTML += '<div class="retrieval-summary"><div class="retrieval-icon">🔎</div><div class="retrieval-text">' +
            '<span class="retrieval-summary-text">' + escapeHtml(data.retrieval.summary || '') + '</span>' +
            '<span class="retrieval-detail-text">' + escapeHtml(data.retrieval.detail) + '</span></div></div>';
    }
    panel.appendChild(body);
    container.appendChild(panel);
}

// ── P4: Confirm Dialog (Purchase) ──
function renderConfirmDialog(container, data) {
    const w = document.createElement('div'); w.className = 'confirm-dialog';
    w.innerHTML =
        '<div class="cd-header"><span class="cd-icon">🛒</span><span class="cd-title">确认购买</span></div>' +
        '<div class="cd-product"><span class="cd-product-name">' + escapeHtml(data.name || '商品') + '</span>' +
        '<span class="cd-product-price">¥' + (data.price || '--') + '</span></div>' +
        '<div class="cd-actions">' +
            '<button class="cd-btn cd-btn-confirm" onclick="confirmPurchaseAction()">✅ 确认购买</button>' +
            '<button class="cd-btn cd-btn-cancel" onclick="cancelPurchaseAction()">❌ 算了</button>' +
        '</div>';
    container.appendChild(w);
}

function confirmPurchaseAction() {
    document.getElementById('workspaceInput').value = '确认';
    submitWorkspace();
}

function cancelPurchaseAction() {
    document.getElementById('workspaceInput').value = '算了';
    submitWorkspace();
}

// ── P5: Order Created Card ──
function renderOrderCreatedCard(container, data) {
    const w = document.createElement('div'); w.className = 'order-created-card';
    w.innerHTML =
        '<div class="oc-success"><span class="oc-check">✅</span><span class="oc-label">下单成功！</span></div>' +
        '<div class="oc-detail">' +
            '<div class="oc-row"><span class="oc-row-label">订单号</span><span class="oc-row-value">' + escapeHtml(data.order_no || '--') + '</span></div>' +
            '<div class="oc-row"><span class="oc-row-label">商品</span><span class="oc-row-value">' + escapeHtml(data.product_name || '--') + '</span></div>' +
            '<div class="oc-row"><span class="oc-row-label">金额</span><span class="oc-row-value oc-price">¥' + escapeHtml(data.amount || '--') + '</span></div>' +
        '</div>' +
        '<button class="oc-btn" onclick="viewOrder(\'' + escapeHtml(data.order_no || '') + '\')">📋 查看订单</button>';
    container.appendChild(w);
}

function viewOrder(orderNo) {
    window.location.href = '/orders/';
}

// ═══════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════
function formatMarkdown(text) {
    if (!text) return '';
    return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function useSuggestion(text) {
    document.getElementById('workspaceInput').value = text;
    submitWorkspace();
}

function dismissError() {
    document.getElementById('errorBanner').classList.add('hidden');
}

// ═══════════════════════════════════════════
// Keyboard
// ═══════════════════════════════════════════
document.getElementById('workspaceInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submitWorkspace();
    }
});

document.getElementById('workspaceInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 150) + 'px';
});

// ═══════════════════════════════════════════
// Init
// ═══════════════════════════════════════════
(async function init() {
    if (!IS_GUEST) {
        await loadSessions();
        const urlSid = urlSessionId();
        if (urlSid && sessions.some(s => s.session_id === urlSid)) {
            switchSession(urlSid);
        } else if (sessions.length > 0) {
            switchSession(sessions[0].session_id);
        }
    } else {
        // Guest: restore from localStorage
        const ls = localStorage.getItem('ai_active_session');
        if (ls) {
            currentSessionId = ls;
            loadMessages();
        }
        renderConversation();
    }
    // Auto-hide sidebar if guest
    if (IS_GUEST) document.getElementById('workspaceLayout').classList.add('guest');
})();
</script>
{% endblock %}
