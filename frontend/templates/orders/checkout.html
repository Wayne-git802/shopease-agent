{% extends 'base.html' %}
{% load static %}

{% block title %}Checkout - ShopEase{% endblock %}

{% block content %}
<div class="container">
    <h1 class="page-title">Checkout</h1>
    
    <div style="max-width: 600px; margin: 0 auto;">
        <!-- 商品信息 -->
        <div class="card" style="padding: 1.5rem; margin-bottom: 1.5rem;">
            <h3 style="margin-bottom: 1rem;">Order Summary</h3>
            <div style="display: flex; align-items: center; padding: 1rem; background: var(--bg-secondary); border-radius: 8px;">
                <img id="checkout-product-image" src="" style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px;">
                <div style="flex: 1; margin-left: 1rem;">
                    <p id="checkout-product-name" style="font-weight: 500; margin-bottom: 0.5rem;"></p>
                    <p style="color: var(--text-secondary);">Quantity: <span id="checkout-product-qty">1</span></p>
                </div>
                <span class="price" id="checkout-product-price" style="font-size: 1.25rem;"></span>
            </div>
            <div style="margin-top: 1rem; text-align: right;">
                <p>Total: <span class="price" id="checkout-total" style="font-size: 1.5rem;"></span></p>
            </div>
        </div>
        
        <!-- 收货信息表单 -->
        <div class="card" style="padding: 1.5rem;">
            <h3 style="margin-bottom: 1.5rem;">Shipping Information</h3>
            
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Receiver Name *</label>
                <input type="text" id="receiver_name" class="form-input" placeholder="Enter receiver name" required
                    value="{{ request.session.last_receiver_name|default:'' }}">
            </div>
            
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Phone Number *</label>
                <input type="tel" id="receiver_phone" class="form-input" placeholder="Enter phone number" required
                    value="{{ request.session.last_receiver_phone|default:'' }}">
            </div>
            
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Delivery Address *</label>
                <textarea id="address" class="form-input" rows="3" placeholder="Enter full delivery address" required
                    style="resize: vertical;">{{ request.session.last_address|default:'' }}</textarea>
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Order Notes (Optional)</label>
                <input type="text" id="remark" class="form-input" placeholder="Any special instructions...">
            </div>
            
            <button id="place-order-btn" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1rem;"
                onclick="placeOrder()">
                Place Order
            </button>
        </div>
    </div>
</div>

<script>
// 从URL参数获取商品信息
function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
}

// 初始化页面
document.addEventListener('DOMContentLoaded', function() {
    const productId = getQueryParam('product_id');
    const name = getQueryParam('name');
    const price = parseFloat(getQueryParam('price') || 0);
    const image = getQueryParam('image');
    const quantity = parseInt(getQueryParam('quantity') || 1);
    
    if (!productId || !name) {
        document.querySelector('.container').innerHTML = `
            <div class="empty-state">
                <h3>No product selected</h3>
                <p>Please select a product to checkout</p>
                <a href="/products/" class="btn btn-primary">Browse Products</a>
            </div>
        `;
        return;
    }
    
    // 填充商品信息
    document.getElementById('checkout-product-name').textContent = decodeURIComponent(name);
    document.getElementById('checkout-product-price').textContent = '¥' + price.toFixed(2);
    document.getElementById('checkout-product-qty').textContent = quantity;
    document.getElementById('checkout-total').textContent = '¥' + (price * quantity).toFixed(2);
    
    if (image) {
        document.getElementById('checkout-product-image').src = decodeURIComponent(image);
    } else {
        document.getElementById('checkout-product-image').style.background = '#ddd';
    }
    
    // 保存到按钮dataset
    document.getElementById('place-order-btn').dataset.productId = productId;
    document.getElementById('place-order-btn').dataset.price = price;
    document.getElementById('place-order-btn').dataset.quantity = quantity;
    document.getElementById('place-order-btn').dataset.name = name;
    document.getElementById('place-order-btn').dataset.image = image || '';
});

// 提交订单
async function placeOrder() {
    const btn = document.getElementById('place-order-btn');
    const productId = parseInt(btn.dataset.productId);
    const quantity = parseInt(btn.dataset.quantity);
    
    const receiverName = document.getElementById('receiver_name').value.trim();
    const receiverPhone = document.getElementById('receiver_phone').value.trim();
    const address = document.getElementById('address').value.trim();
    const remark = document.getElementById('remark').value.trim();
    
    // 验证
    if (!receiverName) {
        showNotification('Please enter receiver name', 'danger');
        return;
    }
    if (!receiverPhone) {
        showNotification('Please enter phone number', 'danger');
        return;
    }
    if (!address) {
        showNotification('Please enter delivery address', 'danger');
        return;
    }
    
    btn.disabled = true;
    btn.textContent = 'Processing...';
    
    try {
        const headers = typeof getAuthHeaders === 'function' ? getAuthHeaders() : {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value || '',
        };

        const response = await fetch('/api/orders/direct-create/', {
            method: 'POST',
            headers: headers,
            body: JSON.stringify({
                product_id: productId,
                quantity: quantity,
                address: address,
                receiver_name: receiverName,
                receiver_phone: receiverPhone,
                remark: remark
            })
        });
        
        const data = await response.json();
        
        if (data.code === 0) {
            showNotification('Order placed successfully! Order No: ' + data.data.order_no);
            setTimeout(() => {
                window.location.href = '/orders/';
            }, 1500);
        } else {
            showNotification(data.msg || 'Order failed', 'danger');
            btn.disabled = false;
            btn.textContent = 'Place Order';
        }
    } catch (error) {
        console.error('Order error:', error);
        showNotification('Order failed. Please try again.', 'danger');
        btn.disabled = false;
        btn.textContent = 'Place Order';
    }
}
</script>

<style>
.form-input {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    font-size: 1rem;
    transition: border-color 0.2s;
}
.form-input:focus {
    outline: none;
    border-color: var(--primary-color);
}
</style>
{% endblock %}
